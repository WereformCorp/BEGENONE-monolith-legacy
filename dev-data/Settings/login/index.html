  <body>
    <div class="container">
      <div class="headings">
        <h1 class="signup-heading">BeGenuine</h1>
        <h3 class="signup-subHeading">
          Welcome To The Light
          <br /><span class="subheading-note"
            >(Btw, Don't worry about the theme, you can change it later)</span
          >
        </h3>
      </div>
      <form class="signup-form">
        <div class="firstname">
          <h3 class="signup-firstname">
            First Name<span class="star">*</span>
          </h3>
          <input
            class="signup-firstname-input"
            type="text"
            name=""
            id=""
            placeholder="Enter your first name"
          />
        </div>
        <div class="lastname">
          <h3 class="signup-lastname">Last Name<span class="star">*</span></h3>
          <input
            class="signup-lastname-input"
            type="text"
            name=""
            id=""
            placeholder="Enter your last name"
          />
        </div>
        <div class="email">
          <h3 class="signup-email">Email<span class="star">*</span></h3>
          <input
            class="signup-email-input"
            type="text"
            name=""
            id=""
            placeholder="Enter your email"
          />
        </div>
        <div class="password">
          <h3 class="signup-password">Password<span class="star">*</span></h3>
          <input
            class="signup-password-input"
            type="text"
            name=""
            id=""
            placeholder="Enter your password"
          />
        </div>
        <div class="password-confirm">
          <h3 class="signup-password-confirm">
            Password Confirm<span class="star">*</span>
          </h3>
          <input
            class="signup-password-confirm-input"
            type="text"
            name=""
            id=""
            placeholder="Enter your password confirm"
          />
        </div>
        <button class="submit-form-btn">SUBMIT</button>
