<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/mediaQueries.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100;200;300;400;500;600;700;800;900&family=Lexend+Exa:wght@100;200;300;400;500;600;700;800;900&family=Lexend+Giga:wght@100;200;300;400;500;600;700;800;900&family=Lexend+Mega:wght@100;200;300;400;500;600;700;800;900&family=Lexend+Peta:wght@100;200;300;400;500;600;700;800;900&family=Lexend+Tera:wght@100;200;300;400;500;600;700;800;900&family=Lexend+Zetta:wght@100;200;300;400;500;600;700;800;900&family=Lexend:wght@100;200;300;400;500;600;700;800;900&family=Montserrat:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: montserrat;
        color: #fff;
      }

      body {
        background-color: #212121;
      }

      .container {
        display: grid;
        grid-template-columns: max-content 6fr 0.5fr;
      }

      .section-left {
        display: grid;
        grid-template-rows: 60px 1fr;
        padding-top: 20px;
        padding-bottom: 20px;
        /* justify-content: center; */
        /* align-items: start; */
        background-color: rgba(61, 61, 61, 0.3);
        border-right: 1px solid #787878;

        overflow-y: hidden;
        height: 100vh;
        top: 0;
        position: sticky;
      }

      .sect-lft-up {
        display: flex;
        justify-self: start;
        align-self: center;
        padding-left: 20px;
        font-weight: 900;
        cursor: pointer;
      }

      .sect-lft-dwn {
        display: flex;
        flex-direction: column;
        row-gap: 10px;
        justify-content: center;
      }

      .sect-lft-dwn-links {
        display: flex;
        column-gap: 20px;
        align-items: center;
        justify-items: center;
        padding: 15px;
        margin-left: 10px;
        margin-right: 10px;
        border-radius: 5px;
      }

      .sect-lft-dwn-links:hover {
        background-color: #383838;
        cursor: pointer;
      }

      .srd-link-Icons {
        width: 20px;
        filter: invert();
      }

      .srd-link-lockIcon {
        width: 18px;
      }

      .srd-link-texts {
        font-size: 16px;
        font-weight: 900;
      }

      .bjenuine-text-header {
        font-size: 24px;
      }

      /* ///////////////////////////////// SECTION MIDDLE /////////////////////////////////// */

      .section-middle {
        display: flex;
        flex-direction: column;
      }

      .sect-mid-nav {
        display: grid;
        grid-template-columns: 0.8fr 1fr;
        align-items: center;
        padding-top: 20px;
        padding-bottom: 10px;
        position: sticky;
        top: 0;
        background-color: #202020;
        z-index: 1000;
      }

      .nav-search {
        display: flex;
        flex-direction: column;
        row-gap: 10px;
      }

      .searchBar-container {
        display: flex;
        width: 100%;
        justify-content: center;
        column-gap: 20px;
      }

      .searchBar-InputField {
        width: 60%;
        height: 45px;
        flex-shrink: 0;
        border-radius: 15px;
        border: 1px solid rgba(120, 120, 120, 0.5);
        background: rgba(60, 60, 60, 0.3);
        outline: none;
        padding: 10px;
      }

      /* .searchBar-InputField::placeholder {
} */

      .searchBar-InputField[type='text'] {
        font-family: montserrat;
        font-weight: 600;
      }

      .searchBar-voiceSearch {
        align-self: center;
        /* padding-top: 5px; */
        height: 20px;
        filter: invert();
      }

      .nav-sort-length,
      .nav-sort-date {
        height: 100%;
      }

      .nav-sort-length-img,
      .nav-sort-date-img {
        height: 20px;
        filter: invert();
      }

      .nav-sort-length-img:hover,
      .nav-sort-date-img:hover,
      .category-bookmark-icon:hover,
      .searchBar-voiceSearch:hover {
        cursor: pointer;
      }

      .bjenuine-text-mediaQuery {
        display: none;
        font-weight: 900;
      }

      .searchBar-keywordContainer {
        background-color: #fff;
        padding: 5px;
        padding-left: 10px;
        padding-right: 10px;
        border-radius: 10px;
      }

      .searchBar-keywordBox {
        display: flex;
        column-gap: 20px;
        justify-content: center;
        color: #202020;
      }

      .searchBar-keywords {
        color: #3c3c3c;
        font-size: 12px;
      }

      /* ///////////////////////////////////// nav-category_n_bookmark ////////////////////////////////// */

      .nav-cat_N_sort {
        display: flex;
        justify-content: center;
        align-items: center;
        column-gap: 30px;
      }

      .nav-cat-kit_n_bookmark,
      .nav-slctvKit {
        display: flex;
        justify-content: center;
        align-items: center;
        column-gap: 20px;
        height: max-content;
      }

      .category-select,
      .nav-slctvKit-select {
        display: flex;
        height: 40px;
        padding: 10px;
        padding-right: 15px;
        padding-left: 15px;
        border-radius: 10px;
        background: #fff;
        column-gap: 15px;
        align-items: center;
      }

      .nav-slctvKit-select {
        background-color: rgb(60, 60, 60, 0.3);
        border: 1px solid rgb(120, 120, 120, 0.5);
      }

      .category-select:hover,
      .nav-slctvKit-select:hover {
        cursor: pointer;
      }

      .category-select-text,
      .nav-slctvKit-select-text {
        color: #202020;
        font-family: Lexend Giga;
        font-size: 12px;
        font-style: normal;
        font-weight: 800;
        line-height: normal;
      }

      .nav-slctvKit-select-text {
        color: #fff;
      }

      .category-select-dwnIcon,
      .nav-slctvKit-select-dwnIcon {
        align-self: center;
        /* padding-top: 4px; */
        height: 20px;
      }

      .nav-slctvKit-select-dwnIcon {
        filter: invert();
      }

      .category-bookmark-icon,
      .nav-slctvKit-bookmark-icon {
        filter: invert();
        height: 20px;
      }

      .nav-slctvKit-bookmark-icon:hover {
        cursor: pointer;
      }

      .nav-sort {
        display: flex;
        column-gap: 30px;
        justify-self: end;
        padding-right: 30px;
        height: max-content;
        align-items: center;
      }

      .nav-sort-age {
        display: flex;
        align-items: center;
        column-gap: 10px;
      }

      .age-toggleContainer {
        display: flex;
        width: 60px;
        height: 25px;
        background-color: #fff;
        border-radius: 20px;
        align-items: center;
      }

      .ageToggler {
        display: flex;
        height: 20px;
        width: 20px;
        border-radius: 25px;
        margin-left: 5px;
        background-color: #3c3c3c;
      }

      /* /////////////////////////////////////////// section-right /////////////////////////////////// */

      .section-right {
        display: grid;
        /* grid-template-rows: 150px 1fr 100px; */
        background-color: rgb(60, 60, 60, 0.3);
        width: 75px;
        height: 90vh;
        position: sticky;
        top: 40px;

        /* align-self: center; */
        justify-content: center;
        border-radius: 30px 0px 0px 30px;
        border: 1px solid rgba(120, 120, 120, 0.5);
        background: rgba(61, 61, 61, 0.3);
      }

      .sect-rgt-icons {
        display: grid;
        grid-template-rows: repeat(3, max-content);
        row-gap: 2.8rem;
        /* grid-template-rows: 130px 4fr 80px; */
        justify-items: center;
        align-self: center;
        justify-content: center;
        /* align-items: center; */
      }

      .sect-rgt-icon-list {
        display: flex;
        flex-direction: column;
        justify-content: end;
        align-items: center;
        row-gap: 10px;
      }

      .sect-rgt-icons-imgs {
        width: 20px;
        filter: invert();
      }

      .sect-rgt-icon-list-container {
        padding: 1.1rem;
        width: 100%;
        height: 100%;
        transition: all 0.1s ease-in-out;
      }

      .sect-rgt-icon-list-container:hover {
        cursor: pointer;
        background-color: rgb(60, 60, 60, 0.5);
        border-radius: 10px;
      }

      .sect-rgt-icon-1 {
        display: flex;
        flex-direction: column;
        row-gap: 10px;
        justify-content: end;
        align-items: center;
        /* width: 25px; */
      }

      .sect-rgt-icon-2 {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        row-gap: 10px;
      }

      /* //////////////////////////////// sect-mid-contentContainer ////////////////////////////////////////// */

      .sect-mid-contentContainer {
        display: grid;
        grid-template-rows: repeat(2, max-content);
        padding: 20px;
      }

      .sect-mid-videoPlayer {
        display: grid;
        grid-template-columns: 75% max-content;
        /* width: 100%; */
        justify-content: center;
        column-gap: 20px;
        /* padding-left: 80px; */
      }

      .sect-mid-vdoP-c1 {
        display: flex;
        flex-direction: column;
        /* padding-left: 80px; */
        align-items: center;
        row-gap: 20px;
      }

      .sect-mid-vdoP-chLogo {
        width: 45px;
      }

      .sect-mid-vdoP-dtls {
        display: grid;
        grid-template-columns: max-content max-content 1fr;
        column-gap: 20px;
        align-self: start;
        width: 100%;
      }

      .sect-mid-vdoP-content {
        width: 100%;
      }

      .vdoPlayer-controls {
        display: grid;
        grid-template-rows: 85% 15%;
        width: 100%;
        height: auto;
        position: relative;
        /* z-index: ; */
      }

      .sect-mid-vdoPlayer-video {
        position: relative;
        max-width: 100%;
        border-radius: 10px;
      }

      .sect-mid-vdoPlayer-video {
        -webkit-fullscreen-fix: none;
      }

      .sect-mid-vdoPlayer-video::-webkit-media-controls {
        display: grid;
      }

      .vdo-ctrlPanel {
        display: grid;
        grid-template-columns: 1fr;
        grid-template-rows: max-content 5px;
        row-gap: 10px;

        position: absolute;
        grid-row: 2 / -1;
        background-color: rgb(32, 32, 32, 0.8);
        width: 100%;
        height: 100%;
        justify-self: center;
        column-gap: 20px;
        padding: 1.25rem;

        z-index: 9999;
        transition: all 1s ease-out;
      }

      .vdo-ctrlPanel .fullscreen {
        opacity: 1;
      }

      .video-controls {
        display: grid;
        grid-template-columns: repeat(8, max-content) 1fr max-content;
        column-gap: 10px;
        /* width: 100%; */
        justify-content: start;
        z-index: 20;
      }

      .vdo-ctrls-item-9 {
        color: #000;
        font-weight: 900;
        margin-right: 10px;
      }

      .vdo-ctrls-item-10,
      .vdo-ctrls-item-9 {
        justify-self: end;
      }

      .vdo-ctrls-items {
        height: 1.25rem;
      }

      .video-controls button {
        background-color: transparent;
        padding: 5px;
        border: none;
        border-radius: 2px;
        cursor: pointer;
        filter: invert();
      }

      /* .vdo-ctrls-item-1 {
   height: 1.125rem; 
} */

      .vdo-bufferLine-container {
        position: absolute;
        grid-row: 2 / 3;
        max-height: 8px;
        background-color: rgb(120, 120, 120, 0.5);
        grid-column: 1 / -1;
        width: 100%;
      }

      .vdo-bufferLine {
        justify-self: start;
        border-radius: 0px;
        width: 0;
        height: 5px;
        background-color: red;
        width: 100%;

        /* position: absolute;
  bottom: 0;
  left: 0;
  width: 0;
  height: 5px;
  background-color: red; */
      }

      .sect-mid-vdo_subscribe {
        display: flex;
        column-gap: 20px;
        justify-self: end;
        align-items: center;
      }

      .sect-mid-vdoP-subsBtn {
        width: 7.5rem;
        height: 2.5rem;
        background-color: #f10000;
        color: #fff;
        font-weight: 800;
        border: none;
        border-radius: 7px;
        outline: none;
        font-size: 1rem;
      }

      .sect-mid-vdoP-subsBtn:hover {
        cursor: pointer;
      }

      .sect-mid-vdoP-notify:hover {
        cursor: pointer;
        /* background-color: rgb(60, 60, 60, 0.5); */
      }

      .vdoP-name {
        font-size: 1.5rem;
        font-weight: 800;
      }

      .vdoP-subsCount {
        font-size: 0.75rem;
        font-weight: 500;
      }

      .sect-mid-vdoP-nav {
        display: flex;
        flex-direction: column;
        row-gap: 5px;
        justify-content: end;
        align-self: end;
        align-items: center;
        background-color: rgb(60, 60, 60, 0.3);
        border: 1px solid rgb(71, 71, 71, 0.3);
        border-radius: 10px;
        height: max-content;
        width: max-content;
        /* padding-top: 5px;
  padding-bottom: 5px; */
        padding: 0.4rem;
        margin-bottom: 5.625rem;
      }

      .sect-mid-vdoP-items {
        padding: 0.8rem;

        border-radius: 5px;
      }

      .vdoPlayer-icon-imgs {
        width: 20px;
        filter: invert();
      }

      .sect-mid-vdoP-items:hover {
        background-color: rgb(56, 56, 56);
        cursor: pointer;
      }

      /* .vdoP-shareIcon,
.sect-mid-vdoP-navAudio {
  filter: invert();
} */

      .sect-mid-ctntTitle {
        font-size: 2rem;
        font-weight: 800;
      }

      /* ////////////////////////////////////// sect-mid-ctntDtls /////////////////////////////////// */
      .sect-mid-ctntDtls_N_recom {
        display: flex;
        /* grid-template-columns: 65% max-content; */
        width: 90%;
        flex-wrap: nowrap;
        padding: 25px;
        justify-self: center;
      }

      .sect-mid-ctntDtls {
        display: flex;
        flex-direction: column;
      }

      .ctnt-des_sects_spnsr {
        display: grid;
        grid-template-rows: repeat(2, max-content);
        /* flex-direction: column; */
        width: 100%;
        background-color: rgb(60, 60, 60, 0.3);
        border: 1px solid rgb(120, 120, 120, 0.5);
        border-radius: 5px;
        padding: 20px;
        row-gap: 20px;
      }

      .ctnt-des-sect-spns-heading {
        display: flex;
        justify-content: space-around;
        /* padding: 20px; */
      }

      .ctnt-des-sect-spns-heading h4 {
        font-weight: 900;
        text-transform: uppercase;
        padding: 20px;
        cursor: pointer;
      }

      .ctnt-desSectSpns-separator {
        width: 1px;
        height: 20px;
        background-color: rgb(120, 120, 120, 0.5);
        align-self: center;
      }

      .head_N_des-separator {
        width: 95%;
        height: 1px;
        justify-self: center;
        background-color: rgb(120, 120, 120, 0.5);
        border: rgb(120, 120, 120, 0.5);
      }

      .ctnt-description {
        padding: 20px;
        padding-top: 0;
        line-height: 1.8;
      }

      .ctnt-sects {
        display: flex;
        padding: 20px;
        overflow-x: scroll;
        width: 100%;
      }

      .ctnt-sect-items {
        display: flex;
        flex-direction: column;
        row-gap: 5px;
        max-width: 180px;
      }

      .ctnt-sect-thumb {
        width: 100%;
      }

      .ctnt-sect-name {
        font-size: 1rem;
      }

      .ctnt-sect-duration {
        font-weight: 500;
      }

      /* //////////////////////////////////// ctnt-comments ///////////////////////////////// */
      .ctnt-comments {
        display: flex;
        flex-direction: column;
        padding: 20px;
        row-gap: 10px;
      }

      .ctnt-cmmnt-analytics {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .ctnt-cmmnt-count {
        display: flex;
        column-gap: 10px;
        padding: 10px;
      }

      .ctnt-cmmnts-text {
        font-weight: 500;
      }

      .ctnt-cmmnts-amount,
      .ctnt-cmmnt-filter-h4 {
        font-weight: 800;
      }

      .ctnt-cmmnt-filter {
        display: flex;
        column-gap: 20px;
        align-items: center;
      }

      .ctnt-cmmntFltr-date {
        padding: 10px;
        background-color: #fff;
        color: #202020;
        font-weight: 800;
        border: 1px solid #787878;
        border-radius: 5px;
        outline: none;
      }

      .ctnt-cmmnt-inputbox {
        width: 100%;
      }

      .ctnt-cmmnt-inputField {
        width: 100%;
        padding: 15px;
        border-radius: 5px;
        font-weight: 500;
        outline: none;
        background-color: #2c2c2c2c;
        border: 1px solid #787878;
      }

      .ctnt-cmmnt-list {
        display: flex;
        flex-direction: column;
        padding: 30px;
        row-gap: 40px;
      }

      .ctnt-cmmnt-listItems {
        display: flex;
        column-gap: 20px;
      }

      .ctnt-cmmnt-dtls {
        display: flex;
        flex-direction: column;
        row-gap: 15px;
      }

      .ctnt-cmmnt-accDtls_N_opts {
        display: grid;
        grid-template-columns: max-content 1fr;
        column-gap: 20px;
      }

      .cmmnt-fltrs {
        display: flex;
        column-gap: 20px;
        justify-self: end;
        align-items: center;
      }

      .cmmnt-fltrs img {
        height: 20px;
      }

      .ctnt-cmmnt-textCmmnt {
        font-size: 0.825rem;
        font-weight: 400;
      }

      .ctnt-cmmnt-reply {
        background-color: rgb(60, 60, 60, 0.3);
        padding: 5px;
        max-width: 60px;
        border: 1px solid rgb(120, 120, 120, 0.5);
        border-radius: 5px;
        outline: none;
        cursor: pointer;
        font-size: 0.7rem;
      }

      /* ////////////////////////////////////// RECOMMNEDATIONS ////////////////////////////////// */
      .sect-mid-ctntRecom {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        padding-right: 0;
        padding-left: 40px;
        row-gap: 40px;
      }

      .content-containers {
        display: flex;
        flex-direction: column;
        max-width: 200px;
        row-gap: 15px;
        cursor: pointer;
      }

      .section-Header {
        display: flex;
        justify-content: space-evenly;
        column-gap: 20px;
        align-items: center;
      }

      .sectionHead-chLogo {
        height: 25px;
      }

      .sectionHead-chName {
        font-size: 14px;
      }

      .sectionHead-tick {
        height: 20px;
      }

      /* .sectionHead-thumbNail {
} */

      .section-details {
        display: flex;
        flex-direction: column;
        row-gap: 15px;
      }

      .section-details-title {
        display: -webkit-box;
        -webkit-box-orient: vertical;
        max-height: 4.4rem;
        -webkit-line-clamp: 2;
        white-space: normal;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
        font-size: 0.825rem;
        font-weight: 500;
      }

      .sectionHead-views,
      .sectionHead-date {
        font-size: 0.8rem;
        font-weight: 400;
      }

      .sectionHead-views_N_date {
        display: flex;
        column-gap: 25px;
        justify-content: start;
      }
    </style>

    <title>BJenuine</title>
  </head>
  <body>
    <main class="container">
      <section class="section-left" id="sect-1">
        <h2 class="sect-lft-up bjenuine-text-header">BJenuine</h2>
        <div class="sect-lft-dwn">
          <div class="sect-lft-dwn-links sect-lft-dwn-link-1">
            <svg class="srd-link-Icons srd-link-lockIcon icon icon-lock-solid">
              <use xlink:href="#icon-lock-solid">
                <symbol id="icon-lock-solid" viewBox="0 0 28 32">
                  <path
                    d="M9 9v3h10v-3c0-2.763-2.238-5-5-5s-5 2.237-5 5zM5 12v-3c0-4.969 4.031-9 9-9s9 4.031 9 9v3h1c2.206 0 4 1.794 4 4v12c0 2.206-1.794 4-4 4h-20c-2.206 0-4-1.794-4-4v-12c0-2.206 1.794-4 4-4h1z"
                  ></path>
                </symbol>
              </use>
            </svg>

            <h3 class="srd-link-texts srd-link-lockText">Lock Screen</h3>
          </div>
          <div class="sect-lft-dwn-links sect-lft-dwn-link-2">
            <svg
              class="srd-link-Icons srd-link-movieIcon icon icon-clapperboard-solid"
            >
              <use xlink:href="#icon-clapperboard-solid">
                <symbol id="icon-clapperboard-solid" viewBox="0 0 32 32">
                  <path
                    d="M28 2h-5.381l-8 8h5.756l7.988-7.981c-0.119-0.013-0.238-0.019-0.363-0.019zM32 10v-4c0-0.944-0.331-1.819-0.875-2.5l-6.5 6.5h7.375zM18.381 2h-5.762l-8 8h5.756l8-8zM4 2c-2.206 0-4 1.794-4 4v4h0.381l8-8h-4.381zM32 12h-32v14c0 2.206 1.794 4 4 4h24c2.206 0 4-1.794 4-4v-14z"
                  ></path>
                </symbol>
              </use>
            </svg>

            <h3 class="srd-link-texts srd-link-miniMovieText">Mini Movies</h3>
          </div>
          <div class="sect-lft-dwn-links sect-lft-dwn-link-3">
            <svg
              class="srd-link-Icons srd-link-playlistIconicon icon icon-list-solid"
