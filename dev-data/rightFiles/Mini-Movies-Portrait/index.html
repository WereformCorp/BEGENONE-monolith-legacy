<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/mediaQueries.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100;200;300;400;500;600;700;800;900&family=Lexend+Exa:wght@100;200;300;400;500;600;700;800;900&family=Lexend+Giga:wght@100;200;300;400;500;600;700;800;900&family=Lexend+Mega:wght@100;200;300;400;500;600;700;800;900&family=Lexend+Peta:wght@100;200;300;400;500;600;700;800;900&family=Lexend+Tera:wght@100;200;300;400;500;600;700;800;900&family=Lexend+Zetta:wght@100;200;300;400;500;600;700;800;900&family=Lexend:wght@100;200;300;400;500;600;700;800;900&family=Montserrat:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <title>BJenuine</title>
  </head>
  <body>
    <main class="container">
      <section class="section-left" id="sect-1">
        <h2 class="sect-lft-up bjenuine-text-header">BJenuine</h2>
        <div class="sect-lft-dwn">
          <div class="sect-lft-dwn-links sect-lft-dwn-link-1">
            <img
              class="srd-link-Icons srd-link-lockIcon"
              src="imgs/Left Section/svgs/lock-solid.svg"
            />
            <h3 class="srd-link-texts srd-link-lockText">Lock Screen</h3>
          </div>
          <div class="sect-lft-dwn-links sect-lft-dwn-link-2">
            <img
              class="srd-link-Icons srd-link-movieIcon"
              src="imgs/Left Section/svgs/clapperboard-solid.svg"
            />
            <h3 class="srd-link-texts srd-link-miniMovieText">Mini Movies</h3>
          </div>
          <div class="sect-lft-dwn-links sect-lft-dwn-link-3">
            <img
              class="srd-link-Icons srd-link-playlistIcon"
              src="imgs/Left Section/svgs/list-solid.svg"
            />
            <h3 class="srd-link-texts srd-link-playlistText">Playlist</h3>
          </div>
          <div class="sect-lft-dwn-links sect-lft-dwn-link-4">
            <img
              class="srd-link-Icons srd-link-subsIcon"
              src="imgs/Left Section/svgs/channel-icon.svg"
            />
            <h3 class="srd-link-texts srd-link-subsText">Channels</h3>
          </div>
          <div class="sect-lft-dwn-links sect-lft-dwn-link-5">
            <img
              class="srd-link-Icons srd-link-servicesIcon"
              src="imgs/Left Section/svgs/service-solid.svg"
            />
            <h3 class="srd-link-texts srd-link-servicesText">Services</h3>
          </div>
          <div class="sect-lft-dwn-links sect-lft-dwn-link-6">
            <img
              class="srd-link-Icons srd-link-gemsIcon"
              src="imgs/Left Section/svgs/gem-solid.svg"
            />
            <h3 class="srd-link-texts srd-link-gemsText">Gems</h3>
          </div>
          <div class="sect-lft-dwn-links sect-lft-dwn-link-7">
            <img
              class="srd-link-Icons srd-link-storyIcon"
              src="imgs/Left Section/svgs/feather-pointed-solid.svg"
            />
            <h3 class="srd-link-texts srd-link-storyText">Stories</h3>
          </div>
          <div class="sect-lft-dwn-links sect-lft-dwn-link-8">
            <img
              class="srd-link-Icons srd-link-settingsIcon"
              src="imgs/Left Section/svgs/gear-solid.svg"
            />
            <h3 class="srd-link-texts srd-link-settingsText">Settings</h3>
          </div>

          <!-- <div class="sect-rgt-dwn-texts"></div> -->
        </div>
      </section>
      <section class="section-middle" id="sect-2">
        <nav class="sect-mid-nav">
          <section class="nav-search">
            <div class="searchBar-container">
              <input
                type="text"
                class="searchBar-InputField"
                placeholder="Search"
              />

              <img
                src="imgs/Middle Nav/microphone-solid.svg"
                class="searchBar-voiceSearch"
              />
            </div>
          </section>
          <h2 class="bjenuine-text-mediaQuery">BJenuine</h2>
          <section class="nav-cat_N_sort">
            <section class="nav-cat-kit_n_bookmark">
              <div class="category-select">
                <h4 class="category-select-text">Select Category</h4>
                <img
                  src="imgs/Middle Nav/caret-down-solid.svg"
                  class="category-select-dwnIcon"
                />
              </div>
            </section>
            <section class="nav-slctvKit">
              <div class="nav-slctvKit-select">
                <h4 class="nav-slctvKit-select-text">Selective Kit</h4>
                <img
                  src="imgs/Middle Nav/caret-down-solid.svg"
                  class="nav-slctvKit-select-dwnIcon"
                />
              </div>

              <img
                src="imgs/Middle Nav/bookmark-solid.svg"
                class="nav-slctvKit-bookmark-icon"
              />
            </section>
          </section>
        </nav>
        <section class="sect-mid-contentContainer">
          <div class="content-containers content-container-1">
            <section class="section-ctnt-mover">
              <img
                class="sect-ctntMover-up"
                src="imgs/Middle Nav/up-solid.svg"
                height="30px"
              />
              <img
                class="sect-ctntMover-dwn"
                src="imgs/Middle Nav/down-solid.svg"
                height="30px"
              />
            </section>
            <section class="section-ctnt-details">
              <section class="sect-ctntDtls-head">
                <img
                  src="imgs/Middle Nav/Video card/channelImage.png"
                  height="30px"
                  class="sect-ctntDtls-chImage"
                />
                <div class="sect-ctntDtls-chName_N_subCount">
                  <h4 class="sect-ctntDtls-chName">Areesh Alam</h4>
                  <h4 class="sect-ctntDtls-subCount">
                    <span>245,000,000</span> Subscribers
                  </h4>
                </div>
                <button class="sect-ctntDtls-subsBtn">Subscribe</button>
              </section>
              <section class="sect-ctntDtls-ctntContainer">
                <section class="sect-ctntDtls-vdoContainer">
                  <video class="sect-mid-vdoPlayer-video">
                    <source
                      src="video/Exposing The Puppet Masters.mp4"
                      type="video/mp4"
                    />
                  </video>
                  <section class="sect-ctntDtls-vdoDtls">
                    <h4 class="sect-ctntDtls-vdoTitle">
                      Video Title Should Be Less than 100 Words
                    </h4>

                    <div class="vdo-bufferLine-container">
                      <div class="vdo-bufferLine"></div>
                    </div>

                    <div class="video-controls">
                      <button class="vdo-ctrls-items vdo-ctrls-item-1">
                        <img
                          class="vdo-ctrls-icons vdo-item-backward"
                          src="imgs/Middle Nav/VideoPlayer/svgs/rotate-left-solid.svg"
                        />
                      </button>
                      <button class="vdo-ctrls-items vdo-ctrls-item-2">
                        <img
                          class="vdo-ctrls-icons vdo-item-forward"
                          src="imgs/Middle Nav/VideoPlayer/svgs/rotate-right-solid.svg"
                        />
                      </button>
                      <button class="vdo-ctrls-items vdo-ctrls-item-3">
                        <img
                          class="vdo-ctrls-icons vdo-item-play"
                          src="imgs/Middle Nav/VideoPlayer/svgs/play-solid.svg"
                        />
                      </button>
                      <button class="vdo-ctrls-items vdo-ctrls-item-4">
                        <img
                          class="vdo-ctrls-icons vdo-item-volume"
                          src="imgs/Middle Nav/VideoPlayer/svgs/volume-xmark-solid.svg"
                        />
                      </button>
                      <button class="vdo-ctrls-items vdo-ctrls-item-6">
                        <img
                          class="vdo-ctrls-icons vdo-item-setting"
                          src="imgs/Middle Nav/VideoPlayer/svgs/gear-solid.svg"
                        />
                      </button>
                      <button class="vdo-ctrls-items vdo-ctrls-item-8">
                        AutoPlay
                      </button>
                    </div>
                  </section>
                </section>
              </section>
            </section>
            <section class="section-ctnt-nav">
              <div class="sect-ctnt-nav-items sect-ctnt-nav-item-1">
                <img
                  src="imgs/Middle Nav/Right-nav/image-portrait-solid.svg"
                  height="30px"
                  class="sect-ctnt-nav-icon sect-ctnt-nav-icon-1"
                />
              </div>
              <div class="sect-ctnt-nav-items sect-ctnt-nav-item-2">
                <img
                  src="imgs/Middle Nav/Right-nav/thumbs-up-solid.svg"
                  height="30px"
                  class="sect-ctnt-nav-icon sect-ctnt-nav-icon-2"
                />
              </div>
              <div class="sect-ctnt-nav-items sect-ctnt-nav-item-3">
                <img
                  src="imgs/Middle Nav/Right-nav/thumbs-down-solid.svg"
                  height="30px"
                  class="sect-ctnt-nav-icon sect-ctnt-nav-icon-3"
                />
              </div>
              <div class="sect-ctnt-nav-items sect-ctnt-nav-item-4">
                <img
                  src="imgs/Middle Nav/Right-nav/messages.svg"
                  height="30px"
                  class="sect-ctnt-nav-icon sect-ctnt-nav-icon-4"
                />
              </div>
              <div class="sect-ctnt-nav-items sect-ctnt-nav-item-5">
                <img
                  src="imgs/Middle Nav/Right-nav/share-nodes-solid.svg"
                  height="30px"
                  class="sect-ctnt-nav-icon sect-ctnt-nav-icon-5"
                />
              </div>
              <div class="sect-ctnt-nav-items sect-ctnt-nav-item-6">
                <img
                  src="imgs/Middle Nav/Right-nav/bookmark-regular.svg"
                  height="30px"
                  class="sect-ctnt-nav-icon sect-ctnt-nav-icon-6"
                />
              </div>
              <div class="sect-ctnt-nav-items sect-ctnt-nav-item-7">
                <img
                  src="imgs/Middle Nav/Right-nav/bars-solid.svg"
                  height="30px"
                  class="sect-ctnt-nav-icon sect-ctnt-nav-icon-7"
                />
              </div>
              <div class="sect-ctnt-nav-items sect-ctnt-nav-item-8">
                <img
                  src="imgs/Middle Nav/Right-nav/music-solid.svg"
                  height="30px"
                  class="sect-ctnt-nav-icon sect-ctnt-nav-icon-8"
                />
              </div>
            </section>
          </div>
        </section>
      </section>
      <section class="section-right" id="sect-3">
        <div class="sect-rgt-icons">
          <section class="sect-rgt-icon-list">
            <div class="sect-rgt-icon-list-container sect-rgt-icon-1">
              <img
                src="imgs/Right Section/svgs/circle-user-solid.svg"
                class="sect-rgt-icons-imgs sect-rgt-icon-img-1"
              />
            </div>
            <div class="sect-rgt-icon-list-container sect-rgt-icon-2">
              <img
                src="imgs/Right Section/svgs/brain-solid.svg"
                class="sect-rgt-icons-imgs sect-rgt-icon-img-2"
              />
            </div>
          </section>
          <section class="sect-rgt-icon-2">
            <div class="sect-rgt-icon-list-container sect-rgt-icon-3">
              <img
                src="imgs/Right Section/svgs/category.svg"
                class="sect-rgt-icons-imgs sect-rgt-icon-img-3"
              />
            </div>
            <div class="sect-rgt-icon-list-container sect-rgt-icon-4">
              <img
                src="imgs/Right Section/svgs/cart-shopping-solid.svg"
                class="sect-rgt-icons-imgs sect-rgt-icon-img-4"
              />
            </div>
            <div class="sect-rgt-icon-list-container sect-rgt-icon-5">
              <img
                src="imgs/Right Section/svgs/bell-solid.svg"
                class="sect-rgt-icons-imgs sect-rgt-icon-img-5"
              />
            </div>
            <div class="sect-rgt-icon-list-container sect-rgt-icon-6">
              <img
                src="imgs/Right Section/svgs/video-solid.svg"
                class="sect-rgt-icons-imgs sect-rgt-icon-img-6"
              />
            </div>
          </section>
          <div class="sect-rgt-icon-list-container sect-rgt-icon-7">
            <img
              src="imgs/Right Section/svgs/bars-solid.svg"
              class="sect-rgt-icons-imgs sect-rgt-icon-img-7"
            />
          </div>
        </div>
      </section>
    </main>
  </body>
  <script src="script.js"></script>
</html>
