<div class="content-containers content-container-1">
  <section class="section-Header">
    <img src="{%OVERVIEW_CH_LOGO%}" class="sectionHead-chLogo" />
    <div class="sectionHead-dtls">
      <div class="sectionHead-chName_N_sub">
        <h3 class="sectionHead-chName">{%OVERVIEW_CH_NAME%}</h3>
        <h5 class="sectionHead-chSubCnt">
          <span>{%OVERVIEW_CH_SUBS_COUNT%}</span> Subscribers
        </h5>
      </div>
      <img src="{%OVERVIEW_CH_VERIFIED%}" class="sectionHead-tick" />
    </div>
  </section>

  <img src="{%OVERVIEW_VDO-THUMB%}" class="sectionHead-thumbNail" />

  <section class="section-details">
    <h4 class="section-details-title">{%OVERVIEW_VDO_TITLE%}</h4>
    <hr width="50px" />
    <div class="sectionHead-views_N_date">
      <h5 class="sectionHead-views">
        <span class="views">{%OVERVIEW_VDO_VIEWS%}</span> Views
      </h5>
      <h5 class="sectionHead-date"><span>{%OVERVIEW_VDO_TIME%}</span>ago</h5>
    </div>
  </section>
</div>
